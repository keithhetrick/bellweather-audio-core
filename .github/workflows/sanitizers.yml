name: Sanitizers

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  asan-ubsan:
    name: asan-ubsan
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build

      - name: Configure library with ASan + UBSan
        run: |
          cmake -S . -B build-asan-ubsan -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DBWS_BUILD_BAROMETER_PLUGIN=OFF \
            -DBWS_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all -O1 -g" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all -O1 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build library
        run: cmake --build build-asan-ubsan --parallel

      - name: Test library
        env:
          ASAN_OPTIONS: "halt_on_error=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
        run: ctest --test-dir build-asan-ubsan --output-on-failure

  tsan:
    name: tsan
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build

      - name: Configure library with TSan
        run: |
          cmake -S . -B build-tsan -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DBWS_BUILD_BAROMETER_PLUGIN=OFF \
            -DBWS_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -O1 -g" \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -O1 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=thread"

      - name: Build library
        run: cmake --build build-tsan --parallel

      - name: Test library
        env:
          TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1:symbolize=1"
        run: ctest --test-dir build-tsan --output-on-failure
