name: Library Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  library:
    name: library-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Install Ninja on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja on macOS
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: Manifest coverage
        run: python tools/check_manifest_coverage.py

      - name: Configure library
        run: cmake --preset library -DBWS_WARNINGS_AS_ERRORS=ON

      - name: Build library
        run: cmake --build --preset library

      - name: Test library
        run: ctest --test-dir build-library --output-on-failure

  barometer-docker:
    name: barometer-docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Barometer source lane
        run: docker build --progress=plain --target barometer-clang -t bellweather-audio-core:barometer-clang .

      - name: Check Barometer source lane
        run: docker run --rm bellweather-audio-core:barometer-clang
